version: '3.8'

services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solidnew-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
      - ./public:/var/www/public
      - ./.env:/var/www/.env:ro
    networks:
      - solidnew-network
    depends_on:
      - db

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: solidnew-nginx
    ports:
      - "8085:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - solidnew-network
    depends_on:
      - app

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: solidnew-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: solidnew
      MYSQL_USER: solidnew
      MYSQL_PASSWORD: solidnew123
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - solidnew-network

volumes:
  dbdata:

networks:
  solidnew-network:
    driver: bridge